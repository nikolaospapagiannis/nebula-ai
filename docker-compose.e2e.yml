# Docker Compose for E2E Testing (No GPU Required)
# This configuration uses external OpenAI API instead of local vLLM

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fireff-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fireflies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fireflies123}
      POSTGRES_DB: ${POSTGRES_DB:-fireflies_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fireff-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fireflies']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fireff-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - fireff-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for Transcripts
  mongodb:
    image: mongo:7
    container_name: fireff-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fireflies}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fireflies_transcripts}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - fireff-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch for Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: fireff-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - fireff-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  # RabbitMQ for Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fireff-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fireflies}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit123}
    ports:
      - '5674:5672'
      - '15674:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fireff-network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO for S3-compatible Storage
  minio:
    image: minio/minio:latest
    container_name: fireff-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-fireflies}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123456}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - fireff-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  fireff-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:
  rabbitmq_data:
  minio_data:
